<!DOCTYPE html>
<html lang="en">

<head>


    <title>Local match</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="./styles/general.css">
    <link rel="stylesheet" href="./styles/game-lobby/local.css">
</head>

<body>
    <center>
        <div>
            <h2 class="text">Select Game Options</h2>
        </div>

        <div class="miniback">

            <div class="container">
                <h2 class="selectPlayerText">
                    Select players
                </h2>
               <div class="playersContainer">
                <div class="player1">
                    <div class="avatar">
                        <img src="./assets/game-board/player-avatars/chicken.png" alt="">
                    </div>
                    <div class="coin">
                        <img src="./assets/coins/blue-coin.png" alt="">
                    </div>
                    <div class="playerName">
                        Player1
                    </div>
                </div>
                <div class="player2">
                    <div class="avatar">
                        <img src="./assets/game-board/player-avatars/rabbit.png" alt="">
                    </div>
                    <div class="coin">
                        <img src="./assets/coins/red-coin.png" alt="">
                    </div>
                    <div class="playerName">
                        Player2
                    </div>
                </div>
                <div class="player3">
                    <div class="avatar">
                        <img src="./assets/game-board/player-avatars/panda.png" alt="">
                    </div>
                    <div class="coin">
                        <img src="./assets/coins/blue-coin.png" alt="">
                    </div>
                    <div class="playerName">
                        Player3
                    </div>
                </div>
                <div class="player4">
                    <div class="avatar">
                        <img src="./assets/game-board/player-avatars/fox.png" alt="">
                    </div>
                    <div class="coin">
                        <img src="./assets/coins/yellow-coin.png">
                    </div>
                    <div class="playerName">
                        Player4
                    </div>
                </div>
               </div>

                <h3 class="text2">Player mode</h3>
                <div class="buttons">
                    <button class="b1">2p</button>
                    <button class="b2">3p</button>
                    <button class="b3">4p</button>
                </div>
                <button class="play"><a href="game-board.html">Play</a></button>
                <button class="cancel"><a href="game-lobby.html">Cancel</a></button>
            </div>

        </div>

    </center>
    <script src="./scripts/game-lobby/computer.js"></script>
</body>

</html>

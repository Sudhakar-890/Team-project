<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>ludo</title>

    <link rel="stylesheet" href="./styles/sign-in/sign-in.css">
</head>

<body>
    <div id="headerLogo">
        <img class="ludoLogo" src="./assets/animated-logos/app-logo.png">
    </div>
    <div id="headerText">
        <h1 class="text">Welcome Back!</h1>

    </div>

    <div id="emailBar">
        <input class="mailBox" type="text">
    </div>
    <div id="passwordBar">
        <input class="passBox" type="text">

    </div>
    <div id="forgotPart">
        <h4 class="forgotText">Forgot Password?</h4>
    </div>
    <div id="signinBar">
        <button class="signinButton">Sign In</button>

    </div>
    <h3 class="ortext">or</h3>
    <div id="goolefacebooksigin">
        <button class="signgoole">Sign In With Google</button>
        <button class="signfacebook">Sign In With Facebook</button>
    </div>
    <br>


    <h3 class="accountText">Don't have an Account?</h3>

    <h3 class="signupText">Sign Up</h3>
</body>

</html>

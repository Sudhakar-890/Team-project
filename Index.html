<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>ludo</title>

    <link rel="stylesheet" href="./styles/sign-in/sign-in.css">
</head>

<body>
    <div id="headerLogo">
        <img class="ludoLogo" src="./assets/animated-logos/app-logo.png">
    </div>
    <div id="headerText">
        <h1 class="text">Welcome Back!</h1>

    </div>

    <div id="emailBar">
        <input class="mailBox" placeholder="Email Id"type="text">
    </div>
    <div id="passwordBar">
        <input class="passBox" placeholder="Password"type="text">

    </div>
    <div id="forgotPart">
        <h2 class="forgotText">Forgot Password?</h2>
    </div>
    <div id="signinBar">
        <button class="signinButton">Sign In</button>

    </div>
    <h3 class="ortext">or</h3>
    <div id="goolefacebooksigin">
        <img class="google"src="/assets/sign-in/google.png">
        <button class="signgoole">Sign In With Google</button>
        <img class="facebook" src="/assets/sign-in/facebook.png">
        <button class="signfacebook">Sign In With Facebook</button>
    </div>

</body>

</html>

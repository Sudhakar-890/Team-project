  #board {
   width: 100%;

  .top {

  .top-board {
   width: 30%;
   background-color: beige;
   height: 100%;

   flex-direction: column;
   flex-wrap: wrap;
  }
  
  .top-board div {
   width: 33%;
   height: 16.6%;
   background-color: blue;
   outline: red solid 1px;
  }

  .leftBoard {

  .leftBoard div {

  .homeContainer{

  outline:1px solid;
  overflow:hidden;
  position:relative;
  }
  
  .q2-home-origin:nth-child(1)

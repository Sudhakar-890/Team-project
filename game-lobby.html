<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Lobby</title>

  <!-- styles -->
   <link rel="stylesheet" href="./styles/general.css">
  <link rel="stylesheet" href="./styles/game-lobby/header.css">
  <link rel="stylesheet" href="./styles/game-lobby/main.css">
  <link rel="stylesheet" href="./styles/game-lobby/footer.css">
</head>

<body>
  <!-- game lobby header -->
  <header>
    <section id="headerContainer">
      <div id="profileBox">
        <img id="profileImg" src="./assets/game-lobby/profile.png" alt="profile img">
      </div>

      <div id="titleBox">
        <img id="title-logo" src="./assets/animated-logos/title-logo.png" alt="ludo">
      </div>

      <div id="menuBox">
        <div class="friendsBox">
          <img id="friends-logo" src="./assets/game-lobby/friends.png" alt="friends logo">
        </div>
        <div class="settingsBox">
          <a href="settings.html"><img id="settings-logo" src="./assets/game-lobby/setting.png" alt="setting logo"></a>
        </div>
      </div>
    </section>
  </header>
  <!-- main -->
  <main>
    <section id="gameModeContainer">
      <div class="computerMatch">       
        <a href="computer.html"><img src="./assets/animated-logos/computer-match.png" alt="computer match"></a>
      </div>
      <div class="localMatch">       
        <a href="local.html"><img src="./assets/animated-logos/local-match.png" alt="local-match"></a>
      </div>
    </section>
  </main>

  <!-- floating pile footer -->
   <footer>
    <section id="pile">
      <div class="gameLobby">
        <h4><a href="game-lobby.html">Lobby</a></h4>
      </div>
      <div class="themeBoard">
        <h4><a href="board-theme.html">Themes</a></h4>
      </div>
      <div class="gameHistory">
        <h4><a href="history.html">History</a></h4>
      </div>
    </section>
   </footer>
   <div class="overlay">
   <div class="profileUserBox">
    <div class="profileUserImg">
      <img src="./assets/game-lobby/profile.png">
    </div>
    <h2 class="profileUserName">Sudhakar</h2>
    <hr>
    <div class="profileUserDetails">
      <p>UserEmail</p>
      <p>change password</p>
    </div>
    <p class="close">x</p>
   </div>
  </div>
   <script type="module" src="./scripts/game-lobby/game-lobby.js"></script>
</body>

<button></button>
</html>

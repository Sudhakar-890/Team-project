<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Lobby</title>

  <!-- styles -->
   <link rel="stylesheet" href="./styles/general.css">
  <link rel="stylesheet" href="./styles/game-lobby/header.css">
  <link rel="stylesheet" href="./styles/game-lobby/main.css">
  <link rel="stylesheet" href="./styles/game-lobby/footer.css">
</head>

<body>
  <!-- game lobby header -->
  <header>
    <section id="headerContainer">
      <div id="profileBox">
        <img id="profileImg" src="assets/game-lobby/profile.png" alt="profile img">
      </div>

      <div id="titleBox">
        <img id="title-logo" src="./assets/animated-logos/title-logo.png" alt="ludo">
      </div>

      <div id="menuBox">
        <div class="friendsBox">
          <img id="friends-logo" src="./assets/game-lobby/friends.png" alt="friends logo">
        </div>
        <div class="settingsBox">
          <img id="settings-logo" src="./assets/game-lobby/setting.png" alt="setting logo">
        </div>
      </div>
    </section>
  </header>
  <!-- main -->
  <main>
    <section id="gameModeContainer">
      <div class="computerMatch">
        <img src="./assets/animated-logos/computer-match.png" alt="computer match">
      </div>
      <div class="localMatch">
        <img src="./assets/animated-logos/local-match.png" alt="local-match">
      </div>
    </section>
  </main>

  <!-- floating pile footer -->
   <footer>
    <section id="pile">
      <div class="gameLobby">
        <h4>Lobby</h4>
      </div>
      <div class="themeBoard">
        <h4>Themes</h4>
      </div>
      <div class="gameHistory">
        <h4>History</h4>
      </div>
    </section>
   </footer>
   <script src="./scripts/game-lobby/game-lobby.js"></script>
</body>

</html>

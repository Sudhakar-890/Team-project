<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Lobby</title>

  <!-- styles -->
  <link rel="stylesheet" href="./styles/game-lobby/header.css">
  <!-- <link rel="stylesheet" href="./styles/game-lobby/main.css">
  <link rel="stylesheet" href="./styles/game-lobby/footer.css"> -->
</head>

<body>
  <!-- game lobby header -->
  <header>
    <section id="headerContainer">
      <div id="profileBox">
        <img id="profileImg" src="assets/game-lobby/profile.png" alt="profile img">
      </div>

      <div id="titleBox">
        <img id="title-logo" src="./assets/animated-logos/title-logo.png" alt="ludo">
      </div>

      <div id="menuBox">
        <div class="friendsBox">
          <img id="friends-logo" src="./assets/game-lobby/friends.png" alt="friends logo">
        </div>
        <div class="settingsBox">
          <img id="settings-logo" src="./assets/game-lobby/setting.png" alt="setting logo">
        </div>
      </div>
    </section>
  </header>

  <!-- main -->
  <main>
    <section id="mainContainer">
      
    </section>
  </main>
</body>

</html>

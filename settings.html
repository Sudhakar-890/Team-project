<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>settings</title>

    <link rel="stylesheet" href="./styles/general.css">
    <link rel="stylesheet" href="./styles/settings/settings.css">
</head>
<body>
        <div class="header">
            <h1>settings</h1>
            <div class="logoutBox">
                <a href="game-lobby.html"><img src="./assets/settings/logout.png">
                </a>
                </div>
        </div>
        <div class="main">
            <div class="division1">
                Game Options
            </div>
            <div class="boxes">
                language
                <button class="changeLanguage">
                    change
                </button>
            </div>
            <div class="boxes">
                sound effects
                <div class="toggle">
                    <div class="togglerCircle"></div>
                </div>
            </div>
            <div class="boxes">
                vibration
                <div class="toggle">
                    <div class="togglerCircle"></div>
                </div>
            </div>
            <div class="boxes">
                chat messages
                <div class="toggle">
                    <div class="togglerCircle"></div>
                </div>
            </div>
            <br>
            <div class="division2">
                Social
            </div>
            <div class="boxes">
                Instagram
                <p>follow us !</p>
                <div class="instagram">
                    <img src="./assets/settings/instagram.png">
                </div>
            </div>
            <div class="boxes">
                Facebook
                <p>follow us !</p>
                <div class="facebook">
                    <img src="./assets/settings/facebook.png">
                </div>
            </div>
            <br>
            <div class="division3">
                Info
            </div>
            <div class="boxes">
                Help & Support
            </div>
            <div class="boxes">
                Terms & Conditions
            </div>
            <div class="boxes">
                Privacy Policy
            </div>
            <div class="boxes">
                Delete Account
            </div>
        </div>

    <div class="overlay">

    </div>
</body>
</html>
